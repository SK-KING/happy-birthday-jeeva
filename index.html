<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎉 Happy Birthday Jeeva Sree! 🎉</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Canvas for Confetti -->
    <canvas id="confettiCanvas"></canvas>
    
    <!-- Fireworks Container -->
    <div id="fireworksContainer"></div>
    
    <!-- Hearts Container -->
    <div id="heartsContainer"></div>

    <!-- Main Container -->
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="controls">
                <button id="themeToggle" class="control-btn" title="Toggle Theme">
                    <i class="fas fa-moon"></i>
                </button>
                <button id="soundToggle" class="control-btn" title="Toggle Sound">
                    <i class="fas fa-volume-up"></i>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <div class="content">
            <!-- Title -->
            <h1 class="main-title">
                <span class="emoji">🎉</span>
                Happy Birthday
                <br>
                <span class="name">Jeeva Sree</span>
                <span class="emoji">🎉</span>
            </h1>

            <!-- Teddy Bear with Cake -->
            <div class="teddy-container">
                <div class="teddy-bear">
                    <div class="teddy-head">
                        <div class="teddy-ear teddy-ear-left"></div>
                        <div class="teddy-ear teddy-ear-right"></div>
                        <div class="teddy-face">
                            <div class="teddy-eye teddy-eye-left"></div>
                            <div class="teddy-eye teddy-eye-right"></div>
                            <div class="teddy-nose"></div>
                        </div>
                    </div>
                    <div class="teddy-body"></div>
                    <div class="teddy-arm teddy-arm-left"></div>
                    <div class="teddy-arm teddy-arm-right">
                        <div class="teddy-cake">
                            <div class="cake-top"></div>
                            <div class="cake-middle"></div>
                            <div class="cake-bottom"></div>
                            <div class="cake-candle"></div>
                            <div class="cake-flame"></div>
                        </div>
                    </div>
                    <div class="teddy-leg teddy-leg-left"></div>
                    <div class="teddy-leg teddy-leg-right"></div>
                </div>
            </div>

            <!-- Birthday Message -->
            <div class="message-box">
                <p class="message">✨ Wishing you a day filled with love, laughter, and endless joy! ✨</p>
                <p class="message">You make every moment special just by being you!</p>
            </div>

            <!-- Action Buttons -->
            <div class="button-group">
                <button class="btn btn-celebrate" id="celebrateBtn">
                    <i class="fas fa-party-horn"></i> CELEBRATE!
                </button>
                <button class="btn btn-music" id="musicBtn">
                    <i class="fas fa-music"></i> Birthday Song
                </button>
                <button class="btn btn-gallery" id="galleryBtn">
                    <i class="fas fa-images"></i> Photo Gallery
                </button>
            </div>

            <!-- Gift Box -->
            <div class="gift-box" id="giftBox">
                <div class="gift-box-top"></div>
                <div class="gift-box-bottom"></div>
                <div class="gift-ribbon"></div>
                <div class="gift-text">🎁</div>
            </div>

            <!-- Photo Gallery Modal -->
            <div class="modal" id="galleryModal">
                <div class="modal-content">
                    <span class="close-btn" id="closeGallery">&times;</span>
                    <h2>Our Beautiful Memories 📸</h2>
                    <div class="gallery">
                        <div class="photo-card">
                            <div class="photo-placeholder">
                                <i class="fas fa-heart"></i>
                                <p>Pic 1</p>
                                <input type="file" class="photo-input" accept="image/*">
                            </div>
                        </div>
                        <div class="photo-card">
                            <div class="photo-placeholder">
                                <i class="fas fa-star"></i>
                                <p>Pic 2</p>
                                <input type="file" class="photo-input" accept="image/*">
                            </div>
                        </div>
                        <div class="photo-card">
                            <div class="photo-placeholder">
                                <i class="fas fa-smile"></i>
                                <p>Pic 3</p>
                                <input type="file" class="photo-input" accept="image/*">
                            </div>
                        </div>
                        <div class="photo-card">
                            <div class="photo-placeholder">
                                <i class="fas fa-camera"></i>
                                <p>Pic 4</p>
                                <input type="file" class="photo-input" accept="image/*">
                            </div>
                        </div>
                        <div class="photo-card">
                            <div class="photo-placeholder">
                                <i class="fas fa-sparkles"></i>
                                <p>Pic 5</p>
                                <input type="file" class="photo-input" accept="image/*">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Share Button -->
            <button class="share-btn" id="shareBtn" title="Share celebration">
                <i class="fas fa-share-alt"></i>
            </button>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>Made with <i class="fas fa-heart"></i> for your special day!</p>
        </footer>
    </div>

    <!-- Audio Element for Birthday Celebration Song -->
    <audio id="birthdayAudio" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2706/2706-preview.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
